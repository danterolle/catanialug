<header class="site-header">
  <div class="navbar">
    <a href="/" class="brand"><img src="{{ "/logo.png" | relURL }}" alt="GLUG Catania" class="brand-logo"> GLUG Catania</a>
    <input type="checkbox" id="nav-toggle" class="nav-toggle">
    <label for="nav-toggle" class="hamburger" aria-label="Apri menu"><span></span></label>
    <nav class="site-nav">
      <ul>
        {{ $current := . }}
        {{ range .Site.Menus.main }}
          {{ if .HasChildren }}
          <li><details class="nav-drop"{{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }} open{{ end }}>
            <summary{{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }} style="color:var(--accent);"{{ end }}>{{ .Name }} ⌄</summary>
            <ul class="dropdown">
              {{ range .Children }}
              <li><a href="{{ .URL | relURL }}"{{ if .URL | strings.HasPrefix "http" }} target="_blank" rel="noopener"{{ end }}{{ if $current.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
              {{ end }}
            </ul>
          </details></li>
          {{ else }}
          <li><a href="{{ .URL | relURL }}"{{ if $current.IsMenuCurrent "main" . }} class="active"{{ end }}{{ if .URL | strings.HasPrefix "http" }} target="_blank" rel="noopener"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        {{ end }}
        <li><a href="{{ "/iscrizione/" | relURL }}" class="btn btn-primary" style="padding:8px 18px;">Diventa socio</a></li>
      </ul>
    </nav>
  </div>
</header>
