{{ define "main" }}
<div class="page-head">
  <div class="container">
    <div class="breadcrumb"><a href="/">Home</a> / <a href="/eventi/">Eventi</a> / {{ .Title }}</div>
    <h1>{{ .Title }}</h1>
  </div>
</div>
<section class="section">
  <div class="container" style="max-width:820px;">
    {{ with .Params.image }}<img src="{{ . }}" alt="{{ $.Title }}" style="border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:24px;">{{ end }}
    <div class="meta" style="margin-bottom:16px;">Evento del {{ .Date.Format "02-01-2006" }}</div>
    {{ .Content }}
    {{ with .Params.locandina }}<a href="{{ . }}" class="btn btn-outline" style="margin-top:16px;">Scarica locandina →</a>{{ end }}
  </div>
</section>
{{ end }}
