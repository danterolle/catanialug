<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}GLUG Catania — GNU/Linux User Group Catania{{ else }}{{ .Title }} — GLUG Catania{{ end }}</title>
{{ with .Site.Params.description }}<meta name="description" content="{{ . }}">{{ end }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/styles.css" | absURL }}">
</head>
<body>
{{ partial "header.html" . }}
{{ block "main" . }}{{ end }}
{{ partial "footer.html" . }}
<script>
document.querySelectorAll('.nav-drop').forEach(d=>{d.addEventListener('toggle',function(){if(this.open)document.querySelectorAll('.nav-drop').forEach(o=>{if(o!==this)o.open=false})})});
document.querySelector('.hamburger')?.addEventListener('click',function(){document.querySelector('.site-nav').classList.toggle('nav-open')});
</script>
</body>
</html>
